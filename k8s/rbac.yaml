apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-k8s-agent-readonly
  namespace: demo-apps
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-k8s-agent-readonly
  namespace: demo-apps
subjects:
  - kind: ServiceAccount
    name: ai-k8s-agent
    namespace: ai-k8s-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-k8s-agent-readonly
